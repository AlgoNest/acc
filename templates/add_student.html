<!DOCTYPE html>
<html>
<head>
  <title>Add Student</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div style="max-width:420px">
    <h5 class="mb-3">Add New Student</h5>
    <form method="POST">
      <div class="mb-2">
        <label class="form-label">Student Name</label>
        <input type="text" name="name" class="form-control" required>
      </div>
      <div class="mb-2">
        <label class="form-label">Parent Phone</label>
        <input type="text" name="parent_phone" class="form-control"
               placeholder="923001234567" required>
        <small class="text-muted">Country code, no + sign, no spaces</small>
      </div>
      <div class="mb-2">
        <label class="form-label">Fee Amount (Rs.)</label>
        <input type="number" name="fee_amount" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Fee Due Day (1-28)</label>
        <input type="number" name="fee_due_day" class="form-control"
               min="1" max="28" required>
        <small class="text-muted">Day of month when reminder fires</small>
      </div>
      <button class="btn btn-primary w-100">Add Student</button>
    </form>
    <a href="/" class="btn btn-link mt-2 ps-0">Back to Dashboard</a>
  </div>
</body>
</html>
